# ═══════════════════════════════════════════════════════════════
# K6 Load Test Dashboard — All-in-One Docker Compose
# ═══════════════════════════════════════════════════════════════
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose down           # Stop all services
#   docker-compose logs -f        # View logs
#
# Ports:
#   Frontend:  http://localhost:8080
#   Backend:   http://localhost:3001
#   Grafana:   http://localhost:3000  (admin / admin)
#   InfluxDB:  http://localhost:8086
# ═══════════════════════════════════════════════════════════════

version: "3.8"

services:
  # ─── InfluxDB (Time-Series Database) ──────────────────────
  influxdb:
    image: influxdb:1.8
    container_name: k6-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_HTTP_AUTH_ENABLED=false
      - INFLUXDB_REPORTING_DISABLED=true
    volumes:
      - influxdb-data:/var/lib/influxdb
    networks:
      - k6-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Grafana (Analytics Dashboard) ────────────────────────
  grafana:
    image: grafana/grafana-oss:latest
    container_name: k6-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/k6-dashboard.json
    volumes:
      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana-provisioning/dashboards/k6-dashboard.json:/var/lib/grafana/dashboards/k6-dashboard.json
      - grafana-data:/var/lib/grafana
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - k6-network

  # ─── Backend (Node.js API + K6 Runner) ────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: k6-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - HOST=0.0.0.0
      - DB_PATH=./data/k6-dashboard.db
      - K6_SCRIPT_PATH=k6-scripts/cross-domain-login.js
      - K6_BINARY_PATH=k6
      - MAX_CONCURRENT_TESTS=3
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-k6dashboard2024securekey32chars!}
      - INFLUXDB_URL=http://influxdb:8086/k6
    volumes:
      - backend-data:/app/data
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - k6-network

  # ─── Frontend (React / NGINX) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3001
        - VITE_WS_URL=ws://localhost:3001
        - VITE_GRAFANA_URL=http://localhost:3000
    container_name: k6-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - k6-network

volumes:
  influxdb-data:
  grafana-data:
  backend-data:

networks:
  k6-network:
    driver: bridge
